<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .auth-section {
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 15px;
        }

        .auth-section h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-github {
            background: #24292e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-github:hover {
            background: #1a1e22;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .user-info {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .user-info p {
            font-size: 13px;
            color: #0c5aa0;
            word-break: break-all;
        }

        .chats-section {
            flex: 1;
            overflow-y: auto;
        }

        .chats-section h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .chat-item {
            padding: 12px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .chat-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .chat-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #dee2e6;
            background: #f8f9fa;
        }

        .chat-header h2 {
            font-size: 18px;
            color: #333;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-radius: 18px 18px 4px 18px;
        }

        .message.assistant .message-bubble {
            background: #e9ecef;
            color: #333;
            border-radius: 18px 18px 18px 4px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #dee2e6;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border-radius: 8px;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .login-card h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .login-card p {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .new-chat-section {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .new-chat-section input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 13px;
        }

        .new-chat-section button {
            padding: 8px 12px;
            background: #28a745;
            color: white;
            border-radius: 6px;
        }

        .new-chat-section button:hover {
            background: #218838;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #6c757d;
            gap: 15px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            opacity: 0.3;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        .message-bubble.typing {
            font-style: italic;
            opacity: 0.8;
        }

        .message.error .message-bubble {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Configuration
        const API_URL = 'http://localhost:8000';
        let state = {
            isAuthenticated: false,
            user: null,
            accessToken: null,
            refreshToken: null,
            chats: [],
            currentChatId: null,
            messages: {},
            isWaitingForLLM: false
        };

        // Initialize app
        function init() {
            loadTokensFromStorage();
            if (state.isAuthenticated) {
                loadChats();
                renderApp();
            } else {
                renderLogin();
            }
        }

        // Token management
        function saveTokensToStorage() {
            localStorage.setItem('accessToken', state.accessToken);
            localStorage.setItem('refreshToken', state.refreshToken);
        }

        function loadTokensFromStorage() {
            state.accessToken = localStorage.getItem('accessToken');
            state.refreshToken = localStorage.getItem('refreshToken');
            state.isAuthenticated = !!state.accessToken;
        }

        function clearTokens() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            state.isAuthenticated = false;
            state.accessToken = null;
            state.refreshToken = null;
            renderLogin();
        }

        // API calls
        async function apiCall(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };

            if (state.accessToken && endpoint !== '/auth/refresh') {
                headers['Authorization'] = `Bearer ${state.accessToken}`;
            }

            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers
            });

            if (response.status === 401 && state.refreshToken) {
                // Try to refresh token
                const refreshed = await refreshAccessToken();
                if (refreshed) {
                    return apiCall(endpoint, options);
                }
            }

            return response;
        }

        async function refreshAccessToken() {
            try {
                const response = await fetch(`${API_URL}/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: state.refreshToken })
                });

                if (response.ok) {
                    const data = await response.json();
                    state.accessToken = data.access_token;
                    state.refreshToken = data.refresh_token;
                    saveTokensToStorage();
                    return true;
                }
            } catch (e) {
                console.error('Token refresh failed:', e);
            }
            clearTokens();
            return false;
        }

        async function registerUser(username, password, email) {
            const response = await apiCall('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, password, email })
            });
            return response.json();
        }

        async function loginUser(username, password) {
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            const response = await fetch(`${API_URL}/auth/token`, {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                state.accessToken = data.access_token;
                state.refreshToken = data.refresh_token;
                state.isAuthenticated = true;
                saveTokensToStorage();
                return true;
            }
            return false;
        }
        async function loadChats() {
            const response = await apiCall('/chats/');
            if (response.ok) {
                state.chats = await response.json();
            }
        }

        async function createChat(title) {
            try {
                const response = await apiCall('/chats/', {
                    method: 'POST',
                    body: JSON.stringify({ title })
                });

                if (response.ok) {
                    const chat = await response.json();
                    state.chats.push(chat);
                    state.messages[chat.id] = [];
                    return chat;
                } else {
                    const error = await response.json().catch(() => ({}));
                    console.error('Failed to create chat:', error);
                    alert(`Error: ${error.detail || 'Failed to create chat'}`);
                    return null;
                }
            } catch (error) {
                console.error('Error creating chat:', error);
                alert(`Error: ${error.message}`);
                return null;
            }
        }

        async function loadMessages(chatId) {
            const response = await apiCall(`/chats/${chatId}/messages`);
            if (response.ok) {
                state.messages[chatId] = await response.json();
            }
        }

        async function sendMessage(chatId, question) {
            try {
                const response = await apiCall(`/chats/${chatId}/messages`, {
                    method: 'POST',
                    body: JSON.stringify({ question })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (!state.messages[chatId]) {
                        state.messages[chatId] = [];
                    }
                    // Add assistant response
                    state.messages[chatId].push({ role: 'assistant', text: data.answer });
                    return true;
                } else {
                    // Show error
                    const errorData = await response.json().catch(() => ({}));
                    state.messages[chatId].push({ 
                        role: 'assistant', 
                        text: `❌ Error: ${errorData.detail || 'Failed to get response'}`,
                        error: true 
                    });
                }
            } catch (error) {
                console.error('Error sending message:', error);
                state.messages[chatId].push({ 
                    role: 'assistant', 
                    text: `❌ Error: ${error.message}`,
                    error: true 
                });
            }
            return false;
        }

        // Event handlers
        function handleGitHubLogin() {
            window.location.href = `${API_URL}/auth/github/login`;
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                clearTokens();
            }
        }

        function handleSelectChat(chatId) {
            state.currentChatId = chatId;
            loadMessages(chatId);
            renderApp();
        }

        async function handleCreateChat() {
            const title = prompt('Chat title:');
            if (title) {
                const chat = await createChat(title);
                if (chat) {
                    state.currentChatId = chat.id;
                    state.messages[chat.id] = [];
                    renderApp();
                } else {
                    alert('Failed to create chat. Please try again.');
                }
            }
        }

        async function handleSendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message || !state.currentChatId) return;

            input.value = '';
            input.disabled = true;
            
            // Add user message to state
            if (!state.messages[state.currentChatId]) {
                state.messages[state.currentChatId] = [];
            }
            state.messages[state.currentChatId].push({ role: 'user', text: message });
            
            // Render with user message and loading indicator
            state.isWaitingForLLM = true;
            renderApp();

            // Send to backend
            const success = await sendMessage(state.currentChatId, message);
            
            state.isWaitingForLLM = false;
            renderApp();
            
            input.disabled = false;
            input.focus();
        }

        // Rendering
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="login-card" style="background: rgba(255, 255, 255, 0.95);">
                            <h1>🚀 LLM Chat</h1>
                            <p>Sign in with GitHub to get started</p>
                            <button class="btn-github" onclick="handleGitHubLogin()" style="width: 100%;">
                                Sign in with GitHub
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderApp() {
            const chatMessages = state.messages[state.currentChatId] || [];

            document.getElementById('app').innerHTML = `
                <div class="container">
                    <div class="sidebar">
                        <div class="auth-section">
                            <h3>Account</h3>
                            <div class="auth-buttons">
                                <button class="btn-danger" onclick="handleLogout()">Logout</button>
                            </div>
                            ${state.isAuthenticated ? `
                                <div class="user-info" style="display: block;">
                                    <p><strong>Token:</strong> ${state.accessToken.substring(0, 20)}...</p>
                                </div>
                            ` : ''}
                        </div>

                        <div class="chats-section">
                            <h3>Chats</h3>
                            <div class="new-chat-section">
                                <button style="flex: 1; padding: 8px;" onclick="handleCreateChat()">+ New Chat</button>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 8px;">
                                ${state.chats.map(chat => `
                                    <div class="chat-item ${chat.id === state.currentChatId ? 'active' : ''}" onclick="handleSelectChat(${chat.id})">
                                        ${chat.title}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <div class="main-content">
                        ${state.currentChatId ? `
                            <div class="chat-header">
                                <h2>${state.chats.find(c => c.id === state.currentChatId)?.title || 'Chat'}</h2>
                            </div>
                            <div class="messages-area">
                                ${chatMessages.length === 0 ? `
                                    <div class="empty-state">
                                        <div>💬 No messages yet</div>
                                        <div style="font-size: 12px;">Start by typing a question below</div>
                                    </div>
                                ` : chatMessages.map(msg => `
                                    <div class="message ${msg.role} ${msg.error ? 'error' : ''}">
                                        <div class="message-bubble">
                                            ${msg.role === 'user' ? '👤' : '🤖'}
                                            <span>${msg.text}</span>
                                        </div>
                                    </div>
                                `).join('')}
                                ${state.isWaitingForLLM ? `
                                    <div class="message assistant">
                                        <div class="message-bubble typing">
                                            <span>🤖 Thinking</span>
                                            <span style="animation: dots 1.4s infinite;">...</span>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="input-area">
                                <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter' && !state.isWaitingForLLM) handleSendMessage()" ${state.isWaitingForLLM ? 'disabled' : ''}>
                                <button onclick="handleSendMessage()" ${state.isWaitingForLLM ? 'disabled' : ''}>${state.isWaitingForLLM ? 'Waiting...' : 'Send'}</button>
                            </div>
                        ` : `
                            <div class="empty-state">
                                <div>👋 Welcome!</div>
                                <div>Create a new chat or select one from the sidebar</div>
                            </div>
                        `}
                    </div>
                </div>
            `;
            
            // Auto-scroll to bottom of messages
            setTimeout(() => {
                const messagesArea = document.querySelector('.messages-area');
                if (messagesArea) {
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                }
            }, 0);
        }

        // Handle OAuth callback
        function handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            const error = params.get('error');
            
            if (error) {
                alert(`Authentication error: ${decodeURIComponent(error)}`);
                window.history.replaceState({}, document.title, '/');
                return;
            }
            
            if (accessToken && refreshToken) {
                // Save tokens from OAuth callback
                state.accessToken = accessToken;
                state.refreshToken = refreshToken;
                state.isAuthenticated = true;
                saveTokensToStorage();
                
                // Clean up URL
                window.history.replaceState({}, document.title, '/');
                
                // Load chats and render app
                loadChats();
                renderApp();
            }
        }

        // Start app
        init();
        handleOAuthCallback();
    </script>
</body>
</html>
